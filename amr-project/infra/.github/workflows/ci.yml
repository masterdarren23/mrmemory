name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  api:
    name: API (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
      - name: Format check
        working-directory: api
        run: cargo fmt --check
      - name: Clippy
        working-directory: api
        run: cargo clippy -- -D warnings
      - name: Tests
        working-directory: api
        run: cargo test

  sdk-python:
    name: SDK (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: sdk-python
        run: pip install -e ".[dev]"
      - name: Test
        working-directory: sdk-python
        run: pytest

  sdk-typescript:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: sdk-typescript
        run: npm ci
      - name: Type check
        working-directory: sdk-typescript
        run: npx tsc --noEmit
      - name: Test
        working-directory: sdk-typescript
        run: npm test
