# MrMemory — Self-Hosted Stack
# Usage: docker compose up -d
# Requires: OPENAI_API_KEY in .env (for embeddings)

services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://mrmemory:mrmemory@postgres:5432/mrmemory
      QDRANT_URL: http://qdrant:6334
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LISTEN_ADDR: 0.0.0.0:8080
      PG_MAX_CONNECTIONS: 20
      MAX_MEMORIES_STARTER: 100000
      MAX_MEMORIES_PRO: 1000000
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mrmemory
      POSTGRES_PASSWORD: mrmemory
      POSTGRES_DB: mrmemory
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrmemory"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # gRPC
      - "6334:6334"   # REST
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
